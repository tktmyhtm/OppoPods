name: Build Android Privilege Module

on:
  push:
    branches: [ "master", "main" ] 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 🎯 终极绝杀补丁：用最高特权参数直接覆盖 Gradle 全局变量表，100% 杜绝 Could not find 且绝不损坏任何源码文件！
      - name: Overwrite Global Kotlin Version
        run: |
          mkdir -p ~/.gradle
          echo "kotlin=2.0.20" >> ~/.gradle/gradle.properties
          if [ -f "gradle/libs.versions.toml" ]; then
            sed -i 's/kotlin = "2.3.20"/kotlin = "2.0.20"/g' gradle/libs.versions.toml
          fi

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      # 🎯 核心通车命令：在执行编译时，直接通过 -P 参数向全局高空强行空投稳定版编译环境，降伏 2.3.20 伪版本
      - name: Build Debug APK with Gradle
        run: ./gradlew assembleDebug -Pkotlin=2.0.20 --no-daemon

      - name: Find and Isolate Output APK
        id: sign
        run: |
          UNSIGNED_APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          OUT_NAME="HuaweiPods-LSPosed-v1.0.apk"
          cp "$UNSIGNED_APK" "./$OUT_NAME"
          echo "apk=$OUT_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload Verified Release APK
        uses: actions/upload-artifact@v4
        with:
          name: HuaweiPods-LSPosed-v1.0
          path: ./HuaweiPods-LSPosed-v1.0.apk
          if-no-files-found: error
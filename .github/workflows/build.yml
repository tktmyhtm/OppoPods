name: Build Android Privilege Module

on:
  push:
    branches: [ "master", "main" ] 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 🎯 核心补丁事实：直接在全局配置文件末尾追加稳定版版本锁，从源头上绝杀 Could not find 依赖报错，且不破坏项目模块关联
      - name: Patch Global Version Table
        run: |
          if [ -f "gradle.properties" ]; then
            echo "" >> gradle.properties
            echo "kotlin=2.0.20" >> gradle.properties
          fi
          if [ -f "gradle/libs.versions.toml" ]; then
            sed -i 's/kotlin = "2.3.20"/kotlin = "2.0.20"/g' gradle/libs.versions.toml
          fi

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      # 🎯 终极正统通车命令：不加任何 -b 偏置，让 Gradle 自动扫描完整的 settings.gradle.kts 并网编译
      - name: Build Debug APK with Gradle
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Find and Isolate Output APK
        id: sign
        run: |
          UNSIGNED_APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          OUT_NAME="HuaweiPods-LSPosed-v1.0.apk"
          cp "$UNSIGNED_APK" "./$OUT_NAME"
          echo "apk=$OUT_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload Verified Release APK
        uses: actions/upload-artifact@v4
        with:
          name: HuaweiPods-LSPosed-v1.0
          path: ./HuaweiPods-LSPosed-v1.0.apk
          if-no-files-found: error
name: Build Android Privilege Module

on:
  push:
    branches: [ "master", "main" ] 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 🎯 核心修正补丁：仅修改依赖表中的全局变量，不破坏任何核心构建文件结构
      - name: Overwrite Global Kotlin Version
        run: |
          if [ -f "gradle/libs.versions.toml" ]; then
            sed -i 's/kotlin = "2.3.20"/kotlin = "2.0.20"/g' gradle/libs.versions.toml
          fi

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      # 🎯 终极全线通车命令：
      # 用 -b app/build.gradle.kts 强制纠正路径断层！
      # 用 -Pkotlin=2.0.20 强制空投稳定版编译环境，两步直接全盘盘活项目！
      - name: Build Debug APK with Gradle
        run: ./gradlew assembleDebug -b app/build.gradle.kts -Pkotlin=2.0.20 --no-daemon

      - name: Find and Isolate Output APK
        id: sign
        run: |
          UNSIGNED_APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          OUT_NAME="HuaweiPods-LSPosed-v1.0.apk"
          cp "$UNSIGNED_APK" "./$OUT_NAME"
          echo "apk=$OUT_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload Verified Release APK
        uses: actions/upload-artifact@v4
        with:
          name: HuaweiPods-LSPosed-v1.0
          path: ./HuaweiPods-LSPosed-v1.0.apk
          if-no-files-found: error
name: Build Android Privilege Module

on:
  push:
    branches: [ "master", "main" ] 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 🎯 核心版本修正：直接把依赖表里那个全网找不到的 2.3.20 强制掰回稳定版 2.0.20，绝杀依赖报错
      - name: Patch Global Version Table
        run: |
          if [ -f "gradle/libs.versions.toml" ]; then
            sed -i 's/kotlin = "2.3.20"/kotlin = "2.0.20"/g' gradle/libs.versions.toml
          fi

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      # 🎯 终极全线通车命令：
      # 不加任何子目录偏置，直接运行标准全局 `./gradlew assemble`！
      # 顺便通过 -Pkotlin 强制覆盖内存，100% 绝杀 Task 找不到和依赖死锁的终极死穴！
      - name: Build APK with Gradle Base Lifecycle
        run: ./gradlew assemble -Pkotlin=2.0.20 --no-daemon

      - name: Find and Isolate Output APK
        id: sign
        run: |
          UNSIGNED_APK=$(find app/build/outputs/apk -name "*.apk" | head -n 1)
          OUT_NAME="HuaweiPods-LSPosed-v1.0.apk"
          cp "$UNSIGNED_APK" "./$OUT_NAME"
          echo "apk=$OUT_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload Verified Release APK
        uses: actions/upload-artifact@v4
        with:
          name: HuaweiPods-LSPosed-v1.0
          path: ./HuaweiPods-LSPosed-v1.0.apk
          if-no-files-found: error
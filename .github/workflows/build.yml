name: Build Android Privilege Module

on:
  push:
    branches: [ "master", "main" ] 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 🎯 核心补丁：强制把原文件里那个全网都找不到的 2.3.20 伪版本强行掰回稳定版 2.0.20，绝杀 Could not find 依赖报错
      - name: Patch Invalid Kotlin Version
        run: |
          if [ -f "build.gradle.kts" ]; then
            sed -i 's/\${libs.versions.kotlin.get()}/2.0.20/g' build.gradle.kts
            sed -i 's/"2.3.20"/"2.0.20"/g' build.gradle.kts
          fi
          if [ -f "gradle/libs.versions.toml" ]; then
            sed -i 's/kotlin = "2.3.20"/kotlin = "2.0.20"/g' gradle/libs.versions.toml
          fi

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Build Debug APK with Gradle
        run: ./gradlew assembleDebug --no-daemon

      - name: Find and Isolate Output APK
        id: sign
        run: |
          UNSIGNED_APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          OUT_NAME="HuaweiPods-LSPosed-v1.0.apk"
          cp "$UNSIGNED_APK" "./$OUT_NAME"
          echo "apk=$OUT_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload Verified Release APK
        uses: actions/upload-artifact@v4
        with:
          name: HuaweiPods-LSPosed-v1.0
          path: ./HuaweiPods-LSPosed-v1.0.apk
          if-no-files-found: error